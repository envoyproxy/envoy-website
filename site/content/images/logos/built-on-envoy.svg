<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 0 300 240" width="300" height="240">
  <defs>
    <!-- Gradient for the hexagon border -->
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d14a9b"/>
      <stop offset="100%" style="stop-color:#a53795"/>
    </linearGradient>

    <!-- Blue-purple gradient for the icon -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b4a9b"/>
      <stop offset="100%" style="stop-color:#4a3080"/>
    </linearGradient>

    <!-- Pink gradient for slash (matching hexagon) -->
    <linearGradient id="slashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d14a9b"/>
      <stop offset="100%" style="stop-color:#a53795"/>
    </linearGradient>
  </defs>

  <!-- Transparent hexagon fill -->
  <polygon
    points="100,15 172,52 172,148 100,185 28,148 28,52"
    fill="transparent"
  />

  <!-- Pink hexagon border -->
  <polygon
    points="100,15 172,52 172,148 100,185 28,148 28,52"
    fill="none"
    stroke="url(#hexGradient)"
    stroke-width="12"
  />

  <!-- >_ terminal prompt -->
  <g transform="translate(100, 100) scale(0.85)">
    <!-- > bracket -->
    <path
      d="M-40,-22 L-4,0 L-40,22"
      fill="none"
      stroke="url(#iconGradient)"
      stroke-width="12"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- _ underscore (cursor) in pink -->
    <rect
      x="10" y="25"
      width="40" height="10"
      rx="3"
      fill="url(#slashGradient)"
    />
  </g>

  <!-- "Built On Envoy" text below the logo -->
  <text x="100" y="230" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="700" fill="#5425AF" letter-spacing="1">Built On Envoy</text>
</svg>
