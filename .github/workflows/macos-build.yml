name: macOS build

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
    - main


jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - run: |
        brew install coreutils gnu-tar
    - run: |
        ./build-website.sh
