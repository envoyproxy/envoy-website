name: macOS build

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
    - main


jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
    - run: |
        brew install coreutils gnu-tar
    - run: |
        ./build-website.sh
